<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>当前时间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .clock-container {
            text-align: center;
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .clock {
            font-size: 4rem;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .date {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
            letter-spacing: 3px;
        }

        .weekday {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .seconds-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #00d4ff;
            box-shadow: 0 0 15px #00d4ff;
            transform: scale(1.2);
        }

        .label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .deploy-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            color: #00d4ff;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="date" id="date"></div>
        <div class="weekday" id="weekday"></div>
        <div class="clock" id="clock"></div>
        <div class="seconds-indicator" id="seconds-indicator"></div>
        <div class="label">Local Time</div>
    </div>

    <div class="deploy-badge">🚀 Auto Deployed</div>

    <script>
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        
        // 创建60个秒针指示点
        const indicatorContainer = document.getElementById('seconds-indicator');
        for (let i = 0; i < 5; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.id = `dot-${i}`;
            indicatorContainer.appendChild(dot);
        }

        function updateClock() {
            const now = new Date();
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const dateStr = `${year}-${month}-${day}`;
            const timeStr = `${hours}:${minutes}:${seconds}`;
            const weekdayStr = weekdays[now.getDay()];
            
            document.getElementById('date').textContent = dateStr;
            document.getElementById('clock').textContent = timeStr;
            document.getElementById('weekday').textContent = weekdayStr;
            
            // 更新秒针指示器
            const secondsNum = now.getSeconds();
            const activeDots = Math.floor(secondsNum / 12);
            for (let i = 0; i < 5; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i < activeDots) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
